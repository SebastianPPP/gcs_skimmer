<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>GCS for skimmers!</title>
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
</head>
<body>

  <!-- ─── CONNECTION STATUS BAR ─────────────────────── -->
  <div id="conn-bar" class="conn-bar conn-connecting">
    <span id="conn-dot" class="conn-dot"></span>
    <span id="conn-label">ŁĄCZENIE...</span>
  </div>

  <!-- ─── SIDEBAR ───────────────────────────────────── -->
  <div id="sidebar">
    <div class="sidebar-lists">
      <h3>Aktywne</h3>
      <div id="active-list"></div>

      <h3>Nieaktywne</h3>
      <div id="inactive-list"></div>

      <h3>Wykryte</h3>
      <div id="detected-list"></div>
    </div>

    <div class="sidebar-control">
      <div id="mission-info"></div>

      <div class="control-group">
        <label>TYP MISJI</label>
        <select id="mission-type-select">
          <option value="lawnmower">LAWNMOWER // OBSZAR</option>
          <option value="waypoints">WAYPOINTS // TRASA</option>
        </select>
      </div>

      <div id="density-control" style="display:none; margin-top:8px;">
        <label class="control-group" style="font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:#4a6655;">ODSTĘP (M)</label>
        <input type="number" id="scan-distance" min="5" value="20">
      </div>

      <div style="margin-top: 10px;">
        <button id="mission-btn">NOWA MISJA</button>
        <button id="generate-path-btn">GENERUJ TRASĘ</button>
        <button id="clear-mission-btn" disabled>USUŃ MISJĘ</button>
      </div>
    </div>
  </div>

  <!-- ─── MAP ───────────────────────────────────────── -->
  <div id="map"></div>

  <!-- ─── TOAST NOTIFICATIONS ──────────────────────── -->
  <div id="toast-container"></div>

  <!-- ─── HUD GAUGES ────────────────────────────────── -->
  <div id="gauges-container" class="hidden">
    <div id="attitude-indicator" class="gauge">
      <div id="horizon-gradient"><div class="horizon-line"></div></div>
      <div id="crosshair"></div>
      <div class="hud-text" id="hud-roll-pitch">R:0 P:0</div>
    </div>
    <div id="compass" class="gauge">
      <div class="compass-rose">
        <span class="compass-label label-n">N</span>
        <span class="compass-label label-e">E</span>
        <span class="compass-label label-s">S</span>
        <span class="compass-label label-w">W</span>
        <div class="compass-needle" id="compass-needle-el"></div>
      </div>
      <div class="hud-text" id="hud-yaw" style="bottom: 10px;">HDG:0°</div>
    </div>
  </div>

  <!-- ─── DRONE DETAIL PANEL ────────────────────────── -->
  <div id="drone-panel" class="hidden">
    <div class="panel-header">
      <div>
        <div class="panel-title">// WYBRANO DRONA</div>
        <div class="panel-drone-id" id="panel-drone-id">—</div>
      </div>
      <button class="panel-close" id="panel-close-btn" title="Zamknij">✕</button>
    </div>

    <!-- Camera -->
    <div class="camera-section">
      <div class="section-label">KAMERA POKŁADOWA</div>
      <div class="camera-feed" id="camera-feed">
        <div class="camera-placeholder" id="cam-placeholder">
          <div class="camera-icon">⬡</div>
          <p>BRAK SYGNAŁU / NO FEED</p>
        </div>
        <video id="cam-video" style="width:100%;height:100%;object-fit:cover;display:none;" autoplay muted playsinline></video>
        <div class="camera-overlay">
          <div class="cam-corner tl"></div>
          <div class="cam-corner tr"></div>
          <div class="cam-corner bl"></div>
          <div class="cam-corner br"></div>
          <div class="cam-status">
            <div class="cam-status-dot"></div>
            <span id="cam-status-label">NO SIGNAL</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Sensors -->
    <div class="sensors-section">
      <div class="section-label">CZUJNIKI</div>
      <div class="sensors-grid">

        <div class="sensor-card available" id="sensor-battery">
          <div class="sensor-badge badge-ok">OK</div>
          <div class="sensor-name">BATERIA</div>
          <div class="sensor-value" id="sv-battery">—</div>
          <div class="sensor-unit">%</div>
        </div>

        <div class="sensor-card available" id="sensor-alt">
          <div class="sensor-badge badge-ok">OK</div>
          <div class="sensor-name">WYSOKOŚĆ</div>
          <div class="sensor-value" id="sv-alt">—</div>
          <div class="sensor-unit">m AGL</div>
        </div>

        <div class="sensor-card available" id="sensor-hdg">
          <div class="sensor-badge badge-ok">OK</div>
          <div class="sensor-name">KURS</div>
          <div class="sensor-value" id="sv-hdg">—</div>
          <div class="sensor-unit">°</div>
        </div>

        <div class="sensor-card unavailable" id="sensor-gps">
          <div class="sensor-badge badge-na">N/A</div>
          <div class="sensor-name">GPS HDOP</div>
          <div class="sensor-value">—</div>
          <div class="sensor-unit">HDOP</div>
        </div>

        <div class="sensor-card unavailable" id="sensor-spd">
          <div class="sensor-badge badge-na">N/A</div>
          <div class="sensor-name">PRĘDKOŚĆ</div>
          <div class="sensor-value">—</div>
          <div class="sensor-unit">m/s</div>
        </div>

        <div class="sensor-card unavailable" id="sensor-temp">
          <div class="sensor-badge badge-na">N/A</div>
          <div class="sensor-name">TEMP ESC</div>
          <div class="sensor-value">—</div>
          <div class="sensor-unit">°C</div>
        </div>

        <div class="sensor-card unavailable" id="sensor-rssi">
          <div class="sensor-badge badge-na">N/A</div>
          <div class="sensor-name">RSSI</div>
          <div class="sensor-value">—</div>
          <div class="sensor-unit">dBm</div>
        </div>

        <div class="sensor-card unavailable" id="sensor-lidar">
          <div class="sensor-badge badge-na">N/A</div>
          <div class="sensor-name">LIDAR</div>
          <div class="sensor-value">—</div>
          <div class="sensor-unit">m</div>
        </div>

        <div class="sensor-card" id="sensor-mission">
          <div class="sensor-badge badge-na" id="sb-mission">—</div>
          <div class="sensor-name">MISJA/WP</div>
          <div class="sensor-value" style="font-size:11px; line-height:1.3;" id="sv-mission">—</div>
          <div class="sensor-unit" id="sv-role">—</div>
        </div>

      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
