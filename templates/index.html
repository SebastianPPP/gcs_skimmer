<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GCS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
</head>
<body>

  <div id="map"></div>

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="tb-left">
      <span class="logo">GCS</span>
      <div id="conn-pill" class="pill pill-warn">
        <span class="pill-dot"></span>
        <span id="conn-label">CONNECTING</span>
      </div>
    </div>
    <div class="tb-right">
      <button class="icon-btn" id="sidebar-toggle" title="Drony">&#9776;</button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar-closed">
    <section class="sb-section">
      <p class="sb-label">AKTYWNE</p>
      <div id="active-list" class="drone-list"></div>
    </section>
    <section class="sb-section">
      <p class="sb-label">NIEAKTYWNE</p>
      <div id="inactive-list" class="drone-list"></div>
    </section>
    <section class="sb-section">
      <p class="sb-label">WYKRYTE</p>
      <div id="detected-list" class="drone-list"></div>
    </section>
    <div class="sb-divider"></div>
    <section class="sb-section">
      <p class="sb-label">MISJA</p>
      <div class="field-row">
        <label class="field-label">TYP</label>
        <select id="mission-type-select" class="field-select">
          <option value="lawnmower">Lawnmower</option>
          <option value="waypoints">Waypoints</option>
        </select>
      </div>
      <div id="density-control" class="field-row" style="display:none">
        <label class="field-label">ODSTEP</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="scan-distance" min="5" value="20" class="field-input" style="width:64px">
          <span class="field-unit">m</span>
        </div>
      </div>
      <div id="mission-info" class="mission-info"></div>
      <div class="btn-stack">
        <button id="mission-btn" class="btn btn-primary">Nowa misja</button>
        <button id="generate-path-btn" class="btn btn-ghost">Generuj trase</button>
        <button id="clear-mission-btn" class="btn btn-ghost" disabled>Usun misje</button>
      </div>
    </section>
  </aside>

  <!-- DRONE PANEL -->
  <div id="drone-panel" class="panel hidden">
    <div class="panel-header">
      <div>
        <p class="panel-sub">WYBRANY DRON</p>
        <p class="panel-title" id="panel-drone-id">-</p>
      </div>
      <button class="icon-btn" id="panel-close-btn">&times;</button>
    </div>

    <div class="hud-row">
      <div class="hud-gauge" id="attitude-indicator">
        <div id="horizon-gradient"><div class="horizon-line"></div></div>
        <div id="crosshair"></div>
        <span class="hud-label" id="hud-roll-pitch">R:0 P:0</span>
      </div>
      <div class="hud-gauge" id="compass">
        <div class="compass-rose">
          <span class="cn cn-n">N</span><span class="cn cn-e">E</span>
          <span class="cn cn-s">S</span><span class="cn cn-w">W</span>
          <div class="compass-needle" id="compass-needle-el"></div>
        </div>
        <span class="hud-label" id="hud-yaw">HDG:0</span>
      </div>
    </div>

    <div class="sensor-grid">
      <div class="sensor-card" id="sensor-battery">
        <span class="sc-name">BAT</span>
        <span class="sc-value" id="sv-battery">-</span>
        <span class="sc-unit">%</span>
        <span class="sc-badge sc-badge-ok" id="sb-battery">OK</span>
      </div>
      <div class="sensor-card">
        <span class="sc-name">ALT</span>
        <span class="sc-value" id="sv-alt">-</span>
        <span class="sc-unit">m</span>
        <span class="sc-badge sc-badge-ok">OK</span>
      </div>
      <div class="sensor-card">
        <span class="sc-name">HDG</span>
        <span class="sc-value" id="sv-hdg">-</span>
        <span class="sc-unit">deg</span>
        <span class="sc-badge sc-badge-ok">OK</span>
      </div>
      <div class="sensor-card sc-dim">
        <span class="sc-name">HDOP</span>
        <span class="sc-value">-</span>
        <span class="sc-unit">HDOP</span>
        <span class="sc-badge sc-badge-na">N/A</span>
      </div>
      <div class="sensor-card sc-dim">
        <span class="sc-name">SPD</span>
        <span class="sc-value">-</span>
        <span class="sc-unit">m/s</span>
        <span class="sc-badge sc-badge-na">N/A</span>
      </div>
      <div class="sensor-card sc-dim">
        <span class="sc-name">RSSI</span>
        <span class="sc-value">-</span>
        <span class="sc-unit">dBm</span>
        <span class="sc-badge sc-badge-na">N/A</span>
      </div>
      <div class="sensor-card" id="sensor-mission" style="grid-column:span 2">
        <span class="sc-name">MISJA / WP</span>
        <span class="sc-value" id="sv-mission" style="font-size:12px">-</span>
        <span class="sc-unit" id="sv-role">-</span>
        <span class="sc-badge sc-badge-na" id="sb-mission">-</span>
      </div>
    </div>

    <div class="cam-section">
      <p class="panel-sub" style="margin-bottom:8px">KAMERA</p>
      <div class="cam-feed" id="camera-feed">
        <div class="cam-placeholder" id="cam-placeholder">
          <span style="font-size:11px;opacity:.5">No feed</span>
        </div>
        <video id="cam-video" style="width:100%;height:100%;object-fit:cover;display:none" autoplay muted playsinline></video>
        <div class="cam-overlay">
          <div class="cam-status">
            <span class="cam-dot" id="cam-dot"></span>
            <span id="cam-status-label">NO SIGNAL</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
